workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: "stable"
      java: "17"
      xcode: "latest"
      cocoapods: "default"
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
