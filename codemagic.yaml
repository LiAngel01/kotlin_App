workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: "17"
      android: "latest"
    scripts:
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
